name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build-android:
        description: 'Build Android APK?'
        required: true
        type: boolean
        default: true

jobs:
  build-android:
    if: ${{ github.event_name == 'release' || inputs.build-android == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate i18n strings
        run: flutter pub run slang

      - name: Build Android APK
        run: flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      # 1. 自動提取版本號並洗刷檔名
      - name: Rename APKs with Version
        id: rename_apks
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cd build/app/outputs/flutter-apk/
          mv app-armeabi-v7a-release.apk "plezy-android-${VERSION}-armeabi-v7a.apk" || true
          mv app-arm64-v8a-release.apk "plezy-android-${VERSION}-arm64-v8a.apk" || true

      # 💥 核心修正：生成臨時金鑰，並調用 Android SDK 原生的 apksigner 進行 V2 強制簽章
      - name: Sign APKs with Android apksigner (V2 Scheme)
        run: |
          # A. 生成金鑰
          keytool -genkey -v -keystore temp.keystore -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass mypassword -keypass mypassword -dname "CN=MySelf, OU=Dev, O=Self, L=Taipei, S=Taiwan, C=TW"
          
          # B. 動態尋找系統中的 apksigner 工具路徑
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          echo "已尋找到 Android 官方簽章工具：$APKSIGNER_PATH"
          
          # C. 對所有更名後的 APK 進行 V2 暴力簽章
          for apk in build/app/outputs/flutter-apk/plezy-android-*.apk; do
            echo "正在為此檔案注入 V2 簽章防禦庫: $apk"
            $APKSIGNER_PATH sign --ks temp.keystore --ks-key-alias temp_alias --ks-pass pass:mypassword --key-pass pass:mypassword "$apk"
          done

      # 2. 將已簽章、帶有版本號的檔案打包上傳
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plezy-android-v${{ steps.rename_apks.outputs.version }}
          path: build/app/outputs/flutter-apk/plezy-android-*.apk
          if-no-files-found: error
